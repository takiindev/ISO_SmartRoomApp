<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>C Quiz Converter - Full Code Fix</title>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f7f6; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        pre { background: #2d2d2d; color: #ccc; padding: 15px; border-radius: 6px; height: 500px; overflow: auto; font-size: 13px; }
        input[type="file"] { padding: 10px; border: 2px dashed #007bff; width: 100%; box-sizing: border-box; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h2>C Quiz Converter (Sửa lỗi đọc Code)</h2>
    <input type="file" id="fileInput" accept=".xlsx, .xls">
    
    <div class="grid">
        <div>
            <h3>JSON Output</h3>
            <pre id="jsonDisplay">Chờ tải file...</pre>
        </div>
        <div>
            <h3>Trạng thái log</h3>
            <pre id="logDisplay" style="background: #eee; color: #333;">Sẵn sàng...</pre>
        </div>
    </div>
</div>

<script>
    document.getElementById('fileInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        const reader = new FileReader();

        reader.onload = function(evt) {
            const data = new Uint8Array(evt.target.result);
            // raw: false cực kỳ quan trọng để không bị biến code thành 'true'
            const workbook = XLSX.read(data, { type: 'array', raw: false });
            const sheet = workbook.Sheets[workbook.SheetNames[0]];
            const rows = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: "" });
            
            const result = processExcel(rows);
            document.getElementById('jsonDisplay').textContent = JSON.stringify(result, null, 2);
        };
        reader.readAsArrayBuffer(file);
    });

    function processExcel(rows) {
        const quizList = [];
        const logs = [];

        for (let i = 0; i < rows.length; i++) {
            const row = rows[i];
            
            // Nhận diện dòng bắt đầu bằng ID ở cột A
            if (row[0] && String(row[0]).trim().startsWith('c_case')) {
                try {
                    let item = {
                        id: String(row[0]).trim(),
                        content: {
                            text: rows[i] ? rows[i][2] : "",   // Ô C (index 2) dòng hiện tại
                            code: rows[i+1] ? String(rows[i+1][2]).trim() : "", // Ô C dòng kế tiếp (C4, C17, C30...)
                            has_code: String(rows[i+2] ? rows[i+2][2] : "").toUpperCase().includes("TRUE")
                        },
                        options: {},
                        answer: String(rows[i][8] || ""), // Cột I
                        explanation: rows[i][9] || ""     // Cột J
                    };

                    // Lấy 4 options dựa trên cột E (index 4) làm key
                    for (let j = 0; j < 4; j++) {
                        const optRow = rows[i + j];
                        if (optRow && optRow[4] !== "") {
                            const key = String(optRow[4]).trim();
                            item.options[key] = {
                                val: String(optRow[6] || ""), // Cột G
                                is_code: String(optRow[7] || "").toUpperCase().includes("TRUE")
                            };
                        }
                    }

                    quizList.push(item);
                    logs.push(`Đã xử lý: ${item.id}`);
                    i += 3; // Nhảy qua các dòng của câu hiện tại
                } catch (err) {
                    logs.push(`Lỗi tại dòng ${i + 1}: ${err.message}`);
                }
            }
        }
        document.getElementById('logDisplay').textContent = logs.join('\n');
        return quizList;
    }
</script>
</body>
</html>
