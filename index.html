<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Device Flow</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f8f9ff; font-family: 'Inter', sans-serif; }
        .step-content { display: none; }
        .step-content.active { display: block; animation: fadeIn 0.3s ease-in-out; }
        .item-card { transition: all 0.2s; border: 1px solid #f1f1f1; }
        .item-card:active { transform: scale(0.98); }
        .selected-badge { background-color: #ecfdf5; border: 1px dashed #10b981; color: #059669; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="max-w-md mx-auto min-h-screen pb-28">

    <header class="flex items-center p-6 bg-white sticky top-0 z-10 shadow-sm mb-4">
        <button onclick="prevStep()" class="w-10 h-10 flex items-center justify-center rounded-full bg-gray-50 text-gray-500 mr-2">
            <i class="fa-solid fa-chevron-left"></i>
        </button>
        <h1 class="text-lg font-bold text-gray-800" id="header-title">Chọn Tầng</h1>
    </header>

    <div class="px-6">
        <div class="flex justify-between mb-8 px-2">
            <div id="prog-1" class="w-1/4 h-1.5 rounded-full bg-purple-600 transition-all"></div>
            <div id="prog-2" class="w-1/4 h-1.5 rounded-full bg-gray-200 transition-all mx-1"></div>
            <div id="prog-3" class="w-1/4 h-1.5 rounded-full bg-gray-200 transition-all mx-1"></div>
            <div id="prog-4" class="w-1/4 h-1.5 rounded-full bg-gray-200 transition-all"></div>
        </div>

        <div id="step-1" class="step-content active">
            <div class="space-y-3">
                <button onclick="nextStep(2, 'Tầng Trệt')" class="item-card w-full p-5 bg-white rounded-2xl flex justify-between items-center shadow-sm">
                    <span class="font-bold text-gray-700">Tầng Trệt</span>
                    <i class="fa-solid fa-chevron-right text-gray-300 text-sm"></i>
                </button>
                <button onclick="nextStep(2, 'Tầng 1')" class="item-card w-full p-5 bg-white rounded-2xl flex justify-between items-center shadow-sm">
                    <span class="font-bold text-gray-700">Tầng 1</span>
                    <i class="fa-solid fa-chevron-right text-gray-300 text-sm"></i>
                </button>
            </div>
        </div>

        <div id="step-2" class="step-content">
            <div class="selected-badge p-4 rounded-xl mb-6 flex justify-between items-center">
                <span class="text-sm font-bold">Tầng: <span id="val-floor"></span></span>
                <i class="fa-solid fa-check-circle"></i>
            </div>
            <div class="space-y-3">
                <button onclick="nextStep(3, 'Phòng Khách')" class="item-card w-full p-5 bg-white rounded-2xl flex justify-between items-center shadow-sm">
                    <span class="font-bold text-gray-700">Phòng Khách</span>
                    <i class="fa-solid fa-chevron-right text-gray-300 text-sm"></i>
                </button>
                <button onclick="nextStep(3, 'Phòng Server')" class="item-card w-full p-5 bg-white rounded-2xl flex justify-between items-center shadow-sm">
                    <span class="font-bold text-gray-700">Phòng Máy Chủ Trung Tâm</span>
                    <i class="fa-solid fa-chevron-right text-gray-300 text-sm"></i>
                </button>
            </div>
        </div>

        <div id="step-3" class="step-content">
            <div class="selected-badge p-4 rounded-xl mb-6 flex justify-between items-center">
                <span class="text-sm font-bold">Phòng: <span id="val-room"></span></span>
                <i class="fa-solid fa-check-circle"></i>
            </div>
            <div class="space-y-3">
                <button onclick="nextStep(4, 'Đèn trần')" class="item-card w-full p-5 bg-white rounded-2xl flex items-center shadow-sm">
                    <div class="w-10 h-10 bg-yellow-50 text-yellow-500 rounded-lg flex items-center justify-center mr-4">
                        <i class="fa-solid fa-lightbulb"></i>
                    </div>
                    <div class="text-left">
                        <p class="font-bold text-gray-700">Đèn trần chính</p>
                        <p class="text-[10px] text-gray-400 uppercase tracking-tighter">Device ID: 01</p>
                    </div>
                </button>
                <button onclick="nextStep(4, 'Máy lạnh')" class="item-card w-full p-5 bg-white rounded-2xl flex items-center shadow-sm">
                    <div class="w-10 h-10 bg-blue-50 text-blue-500 rounded-lg flex items-center justify-center mr-4">
                        <i class="fa-solid fa-snowflake"></i>
                    </div>
                    <div class="text-left">
                        <p class="font-bold text-gray-700">Điều hòa Server</p>
                        <p class="text-[10px] text-gray-400 uppercase tracking-tighter">Device ID: 05</p>
                    </div>
                </button>
            </div>
        </div>

        <div id="step-4" class="step-content">
            <div class="selected-badge p-4 rounded-xl mb-6 flex justify-between items-center">
                <span class="text-sm font-bold">Thiết bị: <span id="val-device"></span></span>
                <i class="fa-solid fa-check-circle"></i>
            </div>
            
            <div class="bg-white rounded-3xl p-6 shadow-sm border border-gray-100 space-y-6">
                <div>
                    <p class="text-sm font-bold text-gray-800 mb-3">Trạng thái:</p>
                    <div class="flex gap-3">
                        <button onclick="toggleAction(this)" class="btn-act flex-1 py-3 rounded-xl border-2 border-emerald-500 bg-emerald-50 text-emerald-600 font-bold transition-all">BẬT (ON)</button>
                        <button onclick="toggleAction(this)" class="btn-act flex-1 py-3 rounded-xl border-2 border-gray-100 bg-white text-gray-400 font-bold transition-all">TẮT (OFF)</button>
                    </div>
                </div>
                <div>
                    <label class="text-[10px] font-bold text-gray-400 uppercase mb-2 block">Thứ tự (Order)</label>
                    <input type="number" value="1" class="w-full p-4 bg-gray-50 border border-gray-100 rounded-2xl outline-none focus:border-purple-400 focus:bg-white transition-all">
                </div>
            </div>
        </div>
    </div>

    <div id="footer-save" class="fixed bottom-0 left-0 right-0 p-6 bg-white border-t border-gray-50 hidden">
        <button class="w-full py-4 bg-purple-600 text-white rounded-2xl font-bold text-lg shadow-lg active:scale-95 transition-transform">
            Hoàn tất cấu hình
        </button>
    </div>

    <script>
        let currentStep = 1;
        const titles = ["Chọn Tầng", "Chọn Phòng", "Chọn Thiết bị", "Cấu hình"];

        function nextStep(step, value) {
            // Lưu giá trị để hiển thị lại ở bước sau
            if(currentStep === 1) document.getElementById('val-floor').innerText = value;
            if(currentStep === 2) document.getElementById('val-room').innerText = value;
            if(currentStep === 3) document.getElementById('val-device').innerText = value;

            // Chuyển UI
            document.getElementById(`step-${currentStep}`).classList.remove('active');
            currentStep = step;
            document.getElementById(`step-${currentStep}`).classList.add('active');
            
            // Cập nhật Progress Bar & Title
            document.getElementById('header-title').innerText = titles[currentStep-1];
            document.getElementById(`prog-${currentStep}`).classList.replace('bg-gray-200', 'bg-purple-600');

            // Hiển thị nút Save ở bước cuối
            document.getElementById('footer-save').style.display = (currentStep === 4) ? 'block' : 'none';
        }

        function prevStep() {
            if (currentStep > 1) {
                document.getElementById(`prog-${currentStep}`).classList.replace('bg-purple-600', 'bg-gray-200');
                document.getElementById(`step-${currentStep}`).classList.remove('active');
                currentStep--;
                document.getElementById(`step-${currentStep}`).classList.add('active');
                document.getElementById('header-title').innerText = titles[currentStep-1];
                document.getElementById('footer-save').style.display = 'none';
            }
        }

        function toggleAction(btn) {
            document.querySelectorAll('.btn-act').forEach(b => {
                b.className = 'btn-act flex-1 py-3 rounded-xl border-2 border-gray-100 bg-white text-gray-400 font-bold transition-all';
            });
            btn.className = 'btn-act flex-1 py-3 rounded-xl border-2 border-emerald-500 bg-emerald-50 text-emerald-600 font-bold transition-all';
        }
    </script>
</body>
</html>
